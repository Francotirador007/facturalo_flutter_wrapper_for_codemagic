workflows: 
  ios-workflow: 
    name: iOS Build 
    environment: 
      flutter: stable 
      xcode: latest 
    scripts: 
      - name: Get Flutter packages 
        script: flutter pub get 
      - name: Build iOS no sign 
        script: flutter build ios --release --no-codesign 
    artifacts: 
      - build/ios/iphoneos/*.app
